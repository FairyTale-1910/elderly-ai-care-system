<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大福 - 老年智能陪护助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="profile-section">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h3 id="userNameDisplay">加载中...</h3>
            <span class="status-badge status-online">● 大福守护中</span>
        </div>

        <div style="margin-top: 20px;">
            <p style="font-size: 14px; color: #888; margin-bottom: 10px;"><i class="fas fa-heartbeat"></i> 今日情感追踪</p>
            <div id="emotionDisplay" style="font-weight: bold; color: var(--primary-color);">平静</div>
        </div>

        <div class="todo-entry-btn" onclick="openTodoModal()">
            <span>📋 我的待办事项</span>
            <span id="todoBadge" class="todo-badge" style="display: none;">0</span>
        </div>

        <div class="history-section">
            <div class="history-header">
                <span class="history-title"><i class="fas fa-history"></i> 历史对话</span>
                <button class="new-chat-btn" onclick="startNewChat()"><i class="fas fa-plus"></i> 新对话</button>
            </div>
            <ul id="sessionList" class="session-list">
            </ul>
        </div>

        <div style="margin-top: auto;">
            <p style="font-size: 12px; color: #bbb;">系统版本 v1.0.2</p>
        </div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <h2>与 <b>大福</b> 对话中</h2>
            <div class="header-actions" style="position: relative;">
                <i class="fas fa-ellipsis-h" onclick="toggleDropdown()" style="color: #ccc; cursor: pointer; font-size: 20px; padding: 5px;"></i>
                <div id="dropdownMenu" class="dropdown-menu" style="display: none;">
                    <div class="dropdown-item" onclick="openProfileModal()">
                        <i class="fas fa-file-medical"></i> 健康档案
                    </div>
                </div>
            </div>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="bubble">爷爷/奶奶您好，我是您的智能助手大福。今天心情怎么样？有什么我可以帮您的吗？</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="点击这里打字，或点击右侧麦克风说话..." onkeypress="handleEnter(event)">
                <button id="voiceBtn" class="voice-btn" onclick="toggleRecording(event)" title="点击开始/结束录音">
                    <i class="fas fa-microphone" id="voiceIcon"></i>
                </button>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <div id="todoModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📝 待办清单</h2>
                    <span class="close-btn" onclick="closeTodoModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <ul id="todoList" class="todo-list">
                    </ul>
                </div>
            </div>
        </div>

        <div id="profileModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📝 老人的健康档案</h2>
                    <span class="close-btn" onclick="closeProfileModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="profileForm" class="profile-form">
                        <div class="form-group">
                            <label>姓名：</label>
                            <input type="text" id="profileName" placeholder="例如：李建国">
                        </div>
                        <div class="form-group">
                            <label>年龄：</label>
                            <input type="number" id="profileAge" placeholder="例如：75">
                        </div>
                        <div class="form-group">
                            <label>性别：</label>
                            <select id="profileGender">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>常用语言/方言：</label>
                            <input type="text" id="profileDialect" value="普通话" placeholder="例如：普通话、四川话、粤语...">
                        </div>
                        <div class="form-group">
                            <label>既往病史：</label>
                            <textarea id="profileMedical" placeholder="例如：高血压、2型糖尿病..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>身体机能状况：</label>
                            <textarea id="profilePhysical" placeholder="例如：膝盖刚做过手术，听力轻微下降..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>饮食禁忌与偏好：</label>
                            <textarea id="profileDiet" placeholder="例如：少油少盐、对海鲜过敏..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>紧急联系人电话：</label>
                            <input type="text" id="profileContact" placeholder="例如：13812345678">
                        </div>
                        <button type="button" class="save-btn" onclick="saveProfile()">💾 保存档案</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="reminderAlertModal" class="modal-overlay" style="display: none; z-index: 9999;">
            <div class="modal-content" style="text-align: center; border-top: 8px solid #FF9800; animation: fadeIn 0.3s;">
                <div style="font-size: 65px; color: #FF9800; margin-bottom: 10px;">
                    <i class="fas fa-bell fa-shake"></i>
                </div>
                <h2 style="font-size: 28px; color: #333; margin-bottom: 15px;">大福提醒您</h2>
                <p id="reminderAlertText" style="font-size: 24px; color: #555; margin-bottom: 30px; font-weight: bold; line-height: 1.5;">
                </p>
                <div class="action-buttons" style="justify-content: center; gap: 20px;">
                    <button id="reminderCompleteBtn" class="complete-btn" style="font-size: 20px; padding: 15px 30px; background: #FF9800;">
                        <i class="fas fa-check-circle"></i> 好的，我这就去
                    </button>
                    <button class="delete-btn" onclick="closeReminderAlertModal()" style="font-size: 18px; padding: 15px 20px; background: #f3f4f6; color: #666;">
                        稍后再说
                    </button>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
